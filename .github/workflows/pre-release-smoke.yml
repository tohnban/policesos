name: Pre-Release Smoke

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer:v2
          coverage: none

      - name: Install dependencies
        working-directory: src
        run: composer install --no-interaction --prefer-dist

      - name: PHP CS Fixer (dry-run)
        run: src/vendor/bin/php-cs-fixer fix --dry-run --diff --allow-risky=yes --config=.php-cs-fixer.dist.php

      - name: PHPStan
        run: src/vendor/bin/phpstan analyse -c phpstan.neon.dist --memory-limit=512M

  smoke:
    runs-on: windows-latest
    needs: quality

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer:v2
          coverage: none

      - name: Install dependencies
        working-directory: src
        run: composer install --no-interaction --prefer-dist

      - name: Run smoke check
        shell: pwsh
        run: pwsh -File scripts/regression-smoke.ps1
